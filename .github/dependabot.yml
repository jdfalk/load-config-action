# Smart Dependabot configuration for bootstrap-load-config-action.11OnVU
# Automatically detected: python, docker, github-actions

version: 2
updates:
- package-ecosystem: pip
  directory: /
  schedule:
    interval: weekly
    day: tuesday
    time: 09:00
    timezone: America/New_York
  open-pull-requests-limit: 3
  commit-message:
    prefix: python
    include: scope
  labels:
  - dependencies
  - priority-medium
  allow:
  - dependency-type: direct
  - dependency-type: indirect
- package-ecosystem: docker
  directory: /
  schedule:
    interval: weekly
    day: thursday
    time: 09:00
    timezone: America/New_York
  open-pull-requests-limit: 3
  commit-message:
    prefix: docker
    include: scope
  labels:
  - dependencies
  - priority-low
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
    day: friday
    time: 09:00
    timezone: America/New_York
  open-pull-requests-limit: 5
  commit-message:
    prefix: ci
    include: scope
  labels:
  - dependencies
  - priority-high
